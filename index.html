idPerInstall":1.82},{"country":"Ukraine","installs":53,"ltv":7.08,"hasTrial":true,"trialCVR":13.21,"directPaid":0.0,"trialPaid":1.89,"paidPerInstall":1.89},{"country":"Romania","installs":51,"ltv":32.53,"hasTrial":true,"trialCVR":9.8,"directPaid":1.96,"trialPaid":0.0,"paidPerInstall":1.96}];

const SCENS=[

  {cr:50,label:'Moderate',desc:'50% CR',cls:'info'},

let S={data:RAW.map(r=>({...r})),tab:'summary',showImport:false,importError:'',minInstalls:50};
let pendingLTV=null,pendingFunnel=null;

function cpt(r,cr){return r.ltv*(cr/100)*(r.paidPerInstall/100);}
function f$(v){return '$'+Number(v).toFixed(3);}
function fP(v){return v>0?v.toFixed(2)+'%':'—';}

function miniBar(val,max,color){
  const pct=max>0?(val/max*100).toFixed(1):0;
  return`<div style="display:flex;align-items:center;gap:6px;">
    <div style="width:48px;height:4px;background:#f0f0ec;border-radius:2px;overflow:hidden;flex-shrink:0;">
      <div style="height:100%;width:${pct}%;background:${color};border-radius:2px;"></div>
    </div>
    <span class="mono" style="font-size:12px;">${val.toFixed(2)}%</span>
  </div>`;
}

function parseLTV(csv){
  const lines=csv.trim().split('\n');
  const hdr=lines[0].split(',').map(s=>s.trim().replace(/"/g,'').toLowerCase());
  const ci=hdr.indexOf('cohort'),si=hdr.indexOf('cohort size');
  const ps=['p4','p3','p2','p1'].map(p=>hdr.indexOf(p));
  if(ci<0) throw new Error('Cannot find "Cohort" column in LTV file');
  const map={};
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(',').map(s=>s.trim().replace(/"/g,''));
    const cohort=cols[ci]||'';
    if(!cohort.includes('Net_revenue')) continue;
    const country=cohort.replace(/\s*\(Net_revenue\)/,'').trim();
    if(country.toLowerCase().includes('weighted')) continue;
    let val=null;
    for(const pi of ps){if(pi>=0&&cols[pi]&&cols[pi]!==''){val=parseFloat(cols[pi]);if(!isNaN(val))break;}}
    if(val) map[country]={ltv:Math.round(val*100)/100,cohortSize:si>=0?parseInt(cols[si])||0:0};
  }
  return map;
}

function parseFunnels(csv){
  const lines=csv.trim().split('\n');
  const hdr=lines[0].split(',').map(s=>s.trim().replace(/"/g,'').toLowerCase());
  const ci=hdr.indexOf('country'),ii=hdr.indexOf('install_absolute'),tri=hdr.indexOf('trial_relative'),dpi=hdr.indexOf('install_paid_relative'),tpi=hdr.indexOf('trial_paid_relative');
  if(ci<0||tri<0||dpi<0||tpi<0) throw new Error('Cannot find required columns in Funnels file');
  const map={};
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(',').map(s=>s.trim().replace(/"/g,''));
    const country=cols[ci];
    if(!country||country==='Total') continue;
    const installs=ii>=0?parseInt(cols[ii])||0:0;
    const trialCVR=parseFloat(cols[tri])||0,directPaid=parseFloat(cols[dpi])||0,trialPaid=parseFloat(cols[tpi])||0;
    map[country]={installs,trialCVR,directPaid,trialPaid,paidPerInstall:Math.round((directPaid+trialPaid)*100)/100,hasTrial:trialCVR>0};
  }
  return map;
}

function mergeData(ltvMap,funnelMap,minInstalls){
  const result=[];
  for(const [country,ltvData] of Object.entries(ltvMap)){
    const f=funnelMap[country];
    if(f&&f.installs>=minInstalls) result.push({country,ltv:ltvData.ltv,...f});
  }
  return result;
}

function readFile(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=()=>rej(new Error('Could not read file'));r.readAsText(file);});}

      <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px;">${stats}</div>
      ${importHTML}
      <div style="display:flex;gap:4px;margin-bottom:16px;background:#f4f4f0;padding:4px;border-radius:8px;width:fit-content;">${tabs}</div>
      ${content}
    </div>`;

  document.getElementById('tog-import').onclick=()=>{S.showImport=!S.showImport;S.importError='';renderApp();};
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;renderApp();});

  if(S.showImport){
    document.getElementById('ltv-upload').onchange=async(e)=>{const f=e.target.files[0];if(f){pendingLTV=await readFile(f);document.getElementById('ltv-name').textContent=f.name;}};
    document.getElementById('funnel-upload').onchange=async(e)=>{const f=e.target.files[0];if(f){pendingFunnel=await readFile(f);document.getElementById('funnel-name').textContent=f.name;}};
    document.getElementById('do-import').onclick=()=>{
      const minI=parseInt(document.getElementById('min-installs').value)||50;
      if(!pendingLTV&&!pendingFunnel){S.importError='Please choose at least one file.';renderApp();return;}
      try{
        let ltvMap=null,funnelMap=null;
        if(pendingLTV) ltvMap=parseLTV(pendingLTV);
        if(pendingFunnel) funnelMap=parseFunnels(pendingFunnel);
        if(ltvMap&&funnelMap){
          S.data=mergeData(ltvMap,funnelMap,minI);
          if(S.data.length===0){S.importError='No matching countries found with that threshold.';renderApp();return;}
        } else if(ltvMap){
          S.data=S.data.filter(r=>r.installs>=minI).map(r=>{const n=ltvMap[r.country];return n?{...r,ltv:n.ltv}:r;});
        } else if(funnelMap){
          const newData=[];
          for(const [country,f] of Object.entries(funnelMap)){
            if(f.installs<minI) continue;
            const existing=S.data.find(r=>r.country===country);
            if(existing) newData.push({...existing,...f});
          }
          S.data=newData;
        }
        S.minInstalls=minI;S.showImport=false;S.importError='';pendingLTV=null;pendingFunnel=null;renderApp();
      }catch(err){S.importError=err.message;renderApp();}
    };
  }
}
renderApp();
</script>
</body>
</html>
